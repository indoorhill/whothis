---

# arch -> brew prefix. NOTE: this logic is intentionally mirrored across three
# runtimes (make/jinja/zsh): Makefile, here, and dotfiles/zsh/.zsh/.zprofile.
brew_prefix: "{{ '/opt/homebrew' if ansible_architecture == 'arm64' else '/usr/local' }}"

dotfiles_dir: "{{ playbook_dir }}/../dotfiles"
dotfile_packages:
  - cache
  - config
  - claude
  - git
  - ssh
  - vim
  - wezterm
  - zsh

homebrew_packages:
  - act  # github actions local testing
  - colima
  - docker
  - gh  # github cli
  - git
  - localstack
  - mas  # Mac Apple Store CLI
  - proton-pass-cli
  - sdkman/tap/sdkman-cli  # Java version manager (auto-taps sdkman/tap)
  - starship
  - stow
  - vim
  - zsh-completions

homebrew_casks:
  - claude
  - claude-code
  - chromium
  - firefox@developer-edition
  - jetbrains-toolbox
  - keepassxc  # provides keepassxc-cli
  - obsidian  # text editor
  - proton-drive
  - proton-pass
  - protonvpn
  - rectangle  # tiling window manager
  - virtualbox
  - wezterm  # terminal (config shipped in dotfiles/wezterm)
  - yubico-authenticator  # security key TOTP

# Mac App Store apps, installed via `mas` (requires being signed into the App Store).
mac_app_store_apps:
  - { id: 497799835, name: Xcode }
  - { id: 409183694, name: Keynote }
  - { id: 409203825, name: Numbers }
  - { id: 409201541, name: Pages }
